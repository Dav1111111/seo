resolver 127.0.0.11 valid=10s ipv6=off;

# HTTP-only on the container side: Jino's load balancer in front of
# this VPS terminates TLS with its own *.vps.myjino.ru wildcard cert
# and proxies plain HTTP to us on port 80. Adding our own 80→443
# redirect or our own :443 listener creates an infinite redirect
# loop, because every external https:// hit comes back to us as http://.
# Owners reach the site over HTTPS automatically — no config from us.
server {
    listen 80;
    server_name _;

    # Frontend (Next.js) — re-resolve DNS every 10s so restarts don't break
    location / {
        set $upstream_frontend frontend:3000;
        proxy_pass http://$upstream_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Backend API — same pattern, re-resolves after backend container restart
    location /api/ {
        set $upstream_backend backend:8000;
        proxy_pass http://$upstream_backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Retry on transient 502/503 from upstream
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 3;
    }

    # Swagger docs and OpenAPI schema — restricted to local/admin ranges.
    # Public exposure leaks the full admin endpoint map (and X-Admin-Key
    # header shape) to anyone who finds the domain. Allow only the VPS
    # itself, the docker bridge network, and the admin's known IP — see
    # docs/INFRA.md to add yourself.
    location /docs {
        allow 127.0.0.1;
        allow 172.16.0.0/12;     # docker bridge networks
        deny all;
        set $upstream_backend_docs backend:8000;
        proxy_pass http://$upstream_backend_docs$request_uri;
    }
    location /openapi.json {
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        deny all;
        set $upstream_backend_openapi backend:8000;
        proxy_pass http://$upstream_backend_openapi$request_uri;
    }
}
