resolver 127.0.0.11 valid=10s ipv6=off;

# HTTP — redirect everything to HTTPS so external links (including
# bookmarks and the bare-domain default of «https://...») always
# end up on TLS. Let's Encrypt http-01 renewal works through the
# certbot.timer with --standalone (briefly stops nginx) so we don't
# need a webroot challenge path here.
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS — primary entrypoint. Cert paths are bind-mounted from the
# host's /etc/letsencrypt directory (see docker-compose.yml).
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/c6b32ea267b.vps.myjino.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/c6b32ea267b.vps.myjino.ru/privkey.pem;

    # Modern TLS only. Let's Encrypt's recommended config — TLSv1.2
    # for a long tail of clients, 1.3 where supported.
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS — once a browser sees this, it pins HTTPS for 6 months.
    # Conservative max-age (no `preload` / no `includeSubDomains`)
    # because the host is a single VPS subdomain we control.
    add_header Strict-Transport-Security "max-age=15552000" always;

    # Frontend (Next.js) — re-resolve DNS every 10s so restarts don't break
    location / {
        set $upstream_frontend frontend:3000;
        proxy_pass http://$upstream_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Backend API — same pattern, re-resolves after backend container restart
    location /api/ {
        set $upstream_backend backend:8000;
        proxy_pass http://$upstream_backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        # Retry on transient 502/503 from upstream
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 3;
    }

    # Swagger docs
    location /docs {
        set $upstream_backend_docs backend:8000;
        proxy_pass http://$upstream_backend_docs$request_uri;
    }
    location /openapi.json {
        set $upstream_backend_openapi backend:8000;
        proxy_pass http://$upstream_backend_openapi$request_uri;
    }
}
