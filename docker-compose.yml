services:
  db:
    restart: unless-stopped
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: growthtower
      POSTGRES_USER: tower
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tower -d growthtower"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    restart: unless-stopped
    image: redis:7-alpine
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    restart: unless-stopped
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    env_file: .env
    volumes:
      # Persist Playwright deep-extract screenshots across rebuilds.
      - deep_screenshots:/app/screenshots
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    restart: unless-stopped
    build: ./backend
    command: celery -A app.workers.celery_app worker -l info -c 2
    env_file: .env
    volumes:
      # Worker writes screenshots; backend reads them. Same volume.
      - deep_screenshots:/app/screenshots
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Deeper liveness check: Docker's default is "process running" which
    # stayed true even when the worker had silently lost its Redis
    # consumer. `celery inspect ping` round-trips through the broker,
    # so a stuck consumer fails the check and triggers a restart.
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping -d celery@$$(hostname) || exit 1"]
      interval: 60s
      timeout: 20s
      start_period: 30s
      retries: 3

  celery-beat:
    restart: unless-stopped
    build: ./backend
    command: celery -A app.workers.celery_app beat -l info --schedule=/tmp/celerybeat-schedule
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    restart: unless-stopped
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
        NEXT_PUBLIC_SITE_ID: ${NEXT_PUBLIC_SITE_ID:-1e11339f-c87e-4742-9d38-6f79463b0d16}
    environment:
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
      BACKEND_INTERNAL_URL: "http://backend:8000"
    depends_on:
      - backend

  nginx:
    restart: unless-stopped
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
  deep_screenshots:
